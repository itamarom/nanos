[mypy]
python_version = 3.12

# ── Strictness ──────────────────────────────────────────────
strict_optional = true
no_implicit_optional = true
check_untyped_defs = true
disallow_incomplete_defs = true
disallow_any_generics = true
disallow_any_unimported = true

# ── Warnings ────────────────────────────────────────────────
warn_return_any = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_unreachable = true

# ── Output ──────────────────────────────────────────────────
show_error_codes = true
show_column_numbers = true
pretty = true

# ── Third-party ─────────────────────────────────────────────
ignore_missing_imports = true

# ── Per-module overrides ────────────────────────────────────
# Suppress import-untyped for libs with partial/no stubs
[mypy-yaml]
ignore_missing_imports = true

[mypy-requests]
ignore_missing_imports = true

[mypy-requests.*]
ignore_missing_imports = true

# These modules use third-party types that have stubs in Docker
# but not always locally — disable unimported-Any to avoid
# "unused type: ignore" vs "missing type" whack-a-mole.
[mypy-gateway.services.openai_service]
disallow_any_unimported = false

[mypy-gateway.services.slackbot_service]
disallow_any_unimported = false

[mypy-worker.runner]
disallow_any_unimported = false

[mypy-runner]
disallow_any_unimported = false
